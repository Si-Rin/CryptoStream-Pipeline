services:
  kafka-1:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-broker-1
    ports:
      - "${KAFKA1_EXTERNAL_PORT}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker-1:9093,2@kafka-broker-2:9093,3@kafka-broker-3:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-broker-1:29092,EXTERNAL://${KAFKA_EXTERNAL_HOST}:${KAFKA1_EXTERNAL_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "${CLUSTER_ID}"
    volumes:
      - kafka-data-1:/var/lib/kafka/data
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-2:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-broker-2
    ports:
      - "${KAFKA2_EXTERNAL_PORT}:9092"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker-1:9093,2@kafka-broker-2:9093,3@kafka-broker-3:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-broker-2:29092,EXTERNAL://${KAFKA_EXTERNAL_HOST}:${KAFKA2_EXTERNAL_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "${CLUSTER_ID}"
    volumes:
      - kafka-data-2:/var/lib/kafka/data
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-3:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-broker-3
    ports:
      - "${KAFKA3_EXTERNAL_PORT}:9092"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker-1:9093,2@kafka-broker-2:9093,3@kafka-broker-3:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-broker-3:29092,EXTERNAL://${KAFKA_EXTERNAL_HOST}:${KAFKA3_EXTERNAL_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "${CLUSTER_ID}"
    volumes:
      - kafka-data-3:/var/lib/kafka/data
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Waiting for Kafka to be ready...'
      
      kafka-topics --bootstrap-server kafka-broker-1:29092 --create --topic crypto-trades-btcusdt --partitions 6 --replication-factor 3 --config retention.ms=86400000 --config retention.bytes=1073741824 --config min.insync.replicas=2

      kafka-topics --bootstrap-server kafka-broker-1:29092 --create --topic crypto-trades-ethusdt --partitions 6 --replication-factor 3 --config retention.ms=86400000 --config retention.bytes=1073741824 --config min.insync.replicas=2 

      kafka-topics --bootstrap-server kafka-broker-1:29092 --create --topic crypto-trades-xrpusdt --partitions 6 --replication-factor 3 --config retention.ms=86400000 --config retention.bytes=1073741824 --config min.insync.replicas=2

      kafka-topics --bootstrap-server kafka-broker-1:29092 --create --topic crypto-trades-solusdt --partitions 6 --replication-factor 3 --config retention.ms=86400000 --config retention.bytes=1073741824 --config min.insync.replicas=2

      kafka-topics --bootstrap-server kafka-broker-1:29092 --create --topic crypto-trades-adausdt --partitions 6 --replication-factor 3 --config retention.ms=86400000 --config retention.bytes=1073741824 --config min.insync.replicas=2

      kafka-topics --bootstrap-server kafka-broker-1:29092 --create --topic crypto-trades-dead-letter --partitions 3 --replication-factor 3
      
      echo '--- Verifying topics ---'
      kafka-topics --bootstrap-server kafka-broker-1:29092 --describe --topic crypto-trades-btcusdt
      kafka-topics --bootstrap-server kafka-broker-1:29092 --describe --topic crypto-trades-ethusdt
      kafka-topics --bootstrap-server kafka-broker-1:29092 --describe --topic crypto-trades-xrpusdt
      kafka-topics --bootstrap-server kafka-broker-1:29092 --describe --topic crypto-trades-solusdt
      kafka-topics --bootstrap-server kafka-broker-1:29092 --describe --topic crypto-trades-adausdt
      kafka-topics --bootstrap-server kafka-broker-1:29092 --describe --topic crypto-trades-dead-letter
      
      echo '--- All topics verified ---'
      echo 'Topics created successfully'
      kafka-topics --bootstrap-server kafka-broker-1:29092 --list
      "
    restart: "no"

  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: prefect-server
    ports:
      - "4200:4200"
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_UI_URL: http://localhost:4200/api
      PREFECT_API_URL: http://localhost:4200/api
      PREFECT_SERVER_API_HOST: 0.0.0.0
    volumes:
      - prefect-data:/root/.prefect
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  kafka-data-1:
  kafka-data-2:
  kafka-data-3:
  prefect-data: